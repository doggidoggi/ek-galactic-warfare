shootDelay:70
aimOffsetSpread:0.25

[turret_1]
shoot_sound:missile_fire
shoot_sound_vol:0.3
shoot_flame:small
shoot_light:#FFEECCCC
shouldResetTurret: false
idleSpin: 0
recoilOffset:    -3
recoilOutTime:    6
recoilReturnTime: 12
projectile:1

[projectile_1]
life: 690
speed: 0.6
targetSpeed: 14
trailEffect: true
largeHitEffect: true
ballistic: true
ballistic_delaymove_height: 40
ballistic_height: 60
frame: 4
areaDamage: 120
areaRadius: 75
autoTargetingOnDeadTarget: true
