[core]
copyFrom: banana_CC_base.template,ROOT:assets/templates/hyperdrive.template
name: sanaCCt2Flying
displayText: Флюксенбург T2
class: CustomUnitMetadata
isBuilding: false
dieOnConstruct:true
nanoRange: 0
isBuilder:true
buildSpeed: 1
selfBuildRate: 0
tags: commandCenter,building,mech,radar,detect

[canBuild_1]
name:sanaCCt2

[hiddenAction_land]
autoTrigger: if self.queueSize(lessThan=1) and distanceBetween(self, self.activeWaypointTarget)<5 and not self.isMoving() and self.hasActiveWaypoint(type='build') and activeWaypointTarget.getAsMarker.nearestUnit(withinRange=10,withTag="building",relation="any")==self
teleportTo: self.activeWaypointTarget
alsoQueueAction:land_2

[hiddenAction_land_2]
convertTo:sanaCCt2
buildSpeed: 0.8s
highPriorityQueue: true
whenBuilding_temporarilyConvertTo: sanaCCt2
whenBuilding_cannotMove:true
canPlayerCancel:false

[graphics]
shadowOffsetX:0
shadowOffsetY:0

[attack]
canAttack:true
canAttackFlyingUnits:true
canAttackLandUnits:true
canAttackUnderwaterUnits:false
turretSize:16
turretTurnSpeed:4
maxAttackRange:300
shootDelay:70
aimOffsetSpread:0.25

[turret_1]
shoot_sound:missile_fire
shoot_sound_vol:0.3
shoot_flame:small
shoot_light:#FFEECCCC
shouldResetTurret: false
idleSpin: 0
recoilOffset:    -3
recoilOutTime:    6
recoilReturnTime: 12
projectile:1

[projectile_1]
life: 690
speed: 0.6
targetSpeed: 14
trailEffect: true
largeHitEffect: true
ballistic: true
ballistic_delaymove_height: 40
ballistic_height: 60
frame: 4
areaDamage: 120
areaRadius: 75
autoTargetingOnDeadTarget: true

[movement]
movementType: AIR
moveSpeed: 3.5
moveAccelerationSpeed: 0.07
moveDecelerationSpeed: 0.12
maxTurnSpeed: 6.5
turnAcceleration: 4.06
reverseSpeedPercentage:0
joinsGroupFormations: false
slowDeathFallSmoke: false
slowDeathFall: false
heightChangeRate: 6
