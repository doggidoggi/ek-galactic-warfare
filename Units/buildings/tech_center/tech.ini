[core]
copyFrom:techNavigation.ini
name:EkTech
displayText:Исследовательский центр
displayDescription:-Может строить грузовики снабжения
price:75000
maxHp:1200
mass:9000
footprint:-2,-2,2,2
constructionFootprint:-2,-2,2,2
techLevel:1
buildSpeed:0.0015
radius:35
isBuilding:true
exit_x:0
exit_y:20
explodeTypeOnDeath:verylargeBuilding
numBitsOnDeath:35
generation_resources:tech=0.6
tags:tech

[action_showMenu1ToPlayer]
isVisible: true
[action_showMenu2ToPlayer]
isVisible: true
[action_showMenu3ToPlayer]
isVisible: true
[action_showMenu4ToPlayer]
isVisible: true
[action_showMenu5ToPlayer]
isVisible: true
[action_showMenu6ToPlayer]
isVisible: true

[placementRule_tech]
searchTags:tech
searchTeam:own
searchDistance:12000
excludeIncompleteBuildings:false
excludeNonBuildings:false
maxCount:2
blocksPlacement:true
cannotPlaceMessage:Нельзя ставить больше трёх
checkEachTile:true

[hiddenAction_aiBoost]
autoTrigger: if self.isControlledByAI()
requireConditional: if self.isControlledByAI()
addResourcesScaledByAIHandicaps: credits=100, experimental=25, crystalline=50


[template_tech]
@copyFromSection: template_integratedInNavigator
displayType: upgrade
buildSpeed: 30s
allowMultipleInQueue: false
iconExtraColor:#fc5e0f
text:%{select(not self.globalTeamTags(includes='${tech}'), "${name}", "-")}
displayRemainingStockpile:false
isLocked: if self.globalTeamTags(includes='${tech}')
isGuiBlinking: if self.globalTeamTags(includes='${tech}')
isLockedMessage: Уже исследовано
playSoundToPlayerOnQueue:ROOT:assets/sounds/event_tech_construction.wav
playSoundToPlayer:ROOT:assets/sounds/event_complete1.wav
iconImage: ROOT:assets/ui/action_icons/template.png
showMessageToPlayer:[${name}] Вы успешно исследовали технологию
addGlobalTeamTags:${tech}

