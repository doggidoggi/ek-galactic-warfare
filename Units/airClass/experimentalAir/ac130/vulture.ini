displayDescription:"Пушки делают Брррт"! \nВершина логистического боя.\n-Очень приличная броня\n-Саморемонт и радар\n-Безумный арсенал против земли\n[Список оружия:]\n-Двойной Гатлинган.Способность:Если пули становятся слишком горячими, могут вызвать эффект огня у цели с шансом 1%\n-Пушечное ядро.Способность:может вызвать пожар при попадании с шансом 60%\n-Аннигилятор МРЛС.Способность:Высокая сопротивляемость лазерной защите\n-Гаубичная пушка.Способность:Цели получают эффект огня после попадания\n-Оружие с режущим лучом.Способность:Пробивает броню\n-Триган.Способность:Ускоряет скорость стрельбы со временем.
techLevel: 2
buildSpeed: 0.0002
availableInDemo: true
effectOnDeath: deadSplash,largeExplosion
effectOnDeathGroundCollision: deadExplosion,deadSpark*7
radius: 78
#displayRadius: 96
isBio: false
#softCollisionOnAll: 3
softCollisionOnAll:48
fogOfWarSightRange: 20
builtFrom_1_name: experimentalLandFactory
builtFrom_1_pos:  5

selfRegenRate:0.6


@global tgHeatLimit: 180
