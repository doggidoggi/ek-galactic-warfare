[core]
name:EkBugTech
displayText:Исследовательский центр
displayDescription:-Может строить грузовики снабжения
price:0, cash=75000
maxHp:1200
mass:9000
footprint:-2,-2,2,2
constructionFootprint:-2,-2,2,2
techLevel:1
buildSpeed:0.0015
radius:35
isBuilding:true
exit_x:0
exit_y:20
explodeTypeOnDeath:verylargeBuilding
numBitsOnDeath:35
generation_resources:scientificPotential=0.6
tags:tech

[placementRule_tech]
searchTags:tech
searchTeam:own
searchDistance:12000
excludeIncompleteBuildings:false
excludeNonBuildings:false
maxCount:2
blocksPlacement:true
cannotPlaceMessage:Нельзя ставить больше трёх
checkEachTile:true

[hiddenAction_aiBoost]
autoTrigger: if self.isControlledByAI()
requireConditional: if self.isControlledByAI()
addResourcesScaledByAIHandicaps: cash=100, alloys=25, minerals=50


[template_tech]
displayType: upgrade
buildSpeed: 30s
allowMultipleInQueue: false
iconExtraColor: #ffb3b3ff
text: ${name}
displayRemainingStockpile:false
isLocked: if self.globalTeamTags(includes='${tech}')
isGuiBlinking: if self.globalTeamTags(includes='${tech}')
isLockedMessage: Уже исследовано
playSoundToPlayerOnQueue:ROOT:assets/sounds/event_tech_construction.wav
playSoundToPlayer:ROOT:assets/sounds/event_complete1.wav
iconImage: template_tech.png
showMessageToPlayer:[${name}] Вы успешно исследовали технологию
addGlobalTeamTags:${tech}

[action_Egg1]
@copyFromSection: template_tech
@define name:Откладка яиц I
@define tech:bugtechEgg1
description: Быстрая откладка яиц позволяет создавать новых жуков быстрее! \n(+25%)
iconExtraImage: Egg1.png

price:0,scientificPotential=100

[action_techEgg2]
@copyFromSection: template_tech
@define name:Откладка яиц II
@define tech:bugtechEgg2
description:Ускорение производства техники для экспансии \n(+25%)
iconExtraImage: Egg2.png

price:0,scientificPotential=100
isLockedAlt: if not self.globalTeamTags(includes='bugtechEgg1')
isLockedAltMessage: Нужна технология

[action_techEgg3]
@copyFromSection: template_tech
@define name:Откладка яиц III
@define tech:bugtechEgg3
description:Ускорение производства техники для экспансии \n(+25%)
iconExtraImage: Egg3.png

price:0,scientificPotential=100
isLockedAlt: if not self.globalTeamTags(includes='bugtechEgg2')
isLockedAltMessage: Нужна технология 


[graphics]
imageScale:0.95
total_frames:1
image:center.png
image_back:SHARED:blank.png
image_wreak: NONE
image_shadow:AUTO
shadowOffsetX:1
shadowOffsetY:1


[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits:   false
canAttackUnderwaterUnits: false
maxAttackRange: 0

[movement]
movementType: NONE
moveSpeed: 0
moveAccelerationSpeed: 0.01
moveDecelerationSpeed: 0.01
maxTurnSpeed: 0
turnAcceleration: 0.1

[ai]

buildPriority: 0.02

noneInBaseExtraPriority: 0.03

noneGlobalExtraPriority: 0.1

maxEachBase: 3
