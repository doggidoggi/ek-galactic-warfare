[core]
copyFrom: extractor_common.ini, ROOT:assets/templates/energyUse.template, ROOT:assets/templates/stopProductionOnNoReserver.template, ROOT:assets/templates/productionConfigUse.template
name: extractorT1
displayLocaleKey: extractor
price: cash=700
maxHp: 800
techLevel: 1
buildSpeed: 0.0010
overrideAndReplace: extractor, extractorT1
borrowResourcesWhileBuilt: energyCreditsNet=2, cashNet=-8

[template_outageConfig]
@define reserveResource: energyCredits
@define outputNetResource1: cashNet
@define outputAmount1: 20
@define outputNetResource2: mineralsNet
@define outputAmount2: 0
@define outageTag: powerOff

[action_upgradeT2]
convertTo: extractorT2
price:0, cash=1400
text: i:gui.actions.upgradeT2
description: i:units.extractor.upgrade.description
displayType: upgrade
buildSpeed: 0.0006
iconExtraImage: SHARED:icon_upgrade_top.png
iconExtraColor: #AAFFFFFF

[animation_idle]
onActions : idle
body_0s: {frame:0}
body_0.8s: {frame:3}
body_1.0s: {frame:3}
pingPong:true

[graphics]
image: extractor.png