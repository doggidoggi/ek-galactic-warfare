
[core]
copyFrom:ROOT:ASSETS/templates/bio.template
name: bugExtractorMod
class: CustomUnitMetadata
price: biomass=1200
maxHp: 800
mass: 10000
displayText: Extractor
displayDescription: -Generates income\n-Can only be built on resources pools
displayDescription_es: -Genera ingresos\n-Solo puede ser construido en pozos de recursos
overrideAndReplace: bugExtractor
generation_resources: biomass=10
generation_delay: 40
techLevel: 1
buildSpeed: 0.002
unitsSpawnedOnDeath: kusaka
