
[core]
dont_load:true
class: CustomUnitMetadata
copyFrom: ROOT:ASSETS/templates/navigations/buildNavigation/buildNavigation.ini

isBuilder: true
canRepairBuildings: true
canRepairUnits : true
canReclaimResources: true
autoRepair: true

nanoRepairSpeed:${core.nanoBuildSpeed}
nanoReclaimSpeed:${core.nanoBuildSpeed}
resourceReclaimMultiplier:${core.nanoBuildSpeed}
nanoUnbuildSpeed:${core.nanoBuildSpeed}
resourceReclaimMultiplier:${core.nanoBuildSpeed}

[action_showMenu1ToPlayer]
isVisible: true
[action_showMenu2ToPlayer]
isVisible: true
[action_showMenu3ToPlayer]
isVisible: true
[template_nukeBuildOption]
isLocked: if game.nukesEnabled()
isLockedMessage: i:gui.actions.nukesDisabled


[canBuild_canReclaim]
name: reclaim
pos:  -0.05

[canBuild_engineerBasicDefence]
@copyFromSection: template_integratedInNavigator
name: c_turret_t1, c_antiAirTurret, laserDefence,EkBarricade1Y,EkBarricade2Y, EkBarricade1X, EkBarricade2X, EkConcreteblock,EkTanktrap,EkTowerRifleman,EkTurretEmpty,EkBunkerTinyMinigun,Ek_radar,Ek_radarturret
pos:  1.02
@define menuID:1
isLocked: false

[canBuild_engineerBasicFactory]
@copyFromSection: template_integratedInNavigator
name: landFactory, airFactory, EkInfantryFactoryT1, experimentalLandFactory, seaFactory
pos:  1.02
@define menuID:2
isLocked: false

[canBuild_engineerBasicEconomy]
@copyFromSection: template_integratedInNavigator
name: extractor, EkTech
pos:  1.02
@define menuID:3
isLocked: false

[canBuild_engineerMech]
isVisible: if memory.currentMenu == ${menuID} and self.globalTeamTags(includes='${tech_mech}')
@copyFromSection: template_integratedInNavigator
name: mechFactory
pos:  1.03
@define menuID:2
isLocked: false

[canBuild_engineerBasicTanks]
@copyFromSection: template_integratedInNavigator
isVisible: if memory.currentMenu == ${menuID} and self.globalTeamTags(includes='${tech_tanks1}')
name: EkSupportFactory
pos:  1.02
@define menuID:2
isLocked: false

[canBuild_engineerAircraft]
@copyFromSection: template_integratedInNavigator
isVisible: if memory.currentMenu == ${menuID} and self.globalTeamTags(includes='lightAircraftTech')
name:EkHelipad
pos:  1.02
@define menuID:2
isLocked: false

[canBuild_basicEconomyTech]
@copyFromSection: template_integratedInNavigator
isVisible: if memory.currentMenu == ${menuID} and self.globalTeamTags(includes='${tech_economy1}')
name:EkHarvesterSolar
pos:  1.03
@define menuID:3
isLocked: false

[canBuild_engineerDefenceSystems1]
@copyFromSection: template_integratedInNavigator
isVisible: if memory.currentMenu == ${menuID} and self.globalTeamTags(includes='${tech_defence1}')
name:EkBrickwall1Y,EkBrickwall2Y,EkBrickwall1X,EkBrickwall2X,EkBunkerTinyMinigun,EkBunkerAa,EkBunkerFortress,EkBunkerMg,EkBunkerSupportT1,EkBunkerTinyArtillary,EkBunkerTinyFlame,EkBunkerTinySam,EkBunkerTinyInterceptor,AntiNukeLaucher
pos:  1.03
@define menuID:1
isLocked: false

[ai]
useAsBuilder: true
useAsHarvester: ${section.useAsBuilder}