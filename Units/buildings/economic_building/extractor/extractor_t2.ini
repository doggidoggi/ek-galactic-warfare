
[core]
copyFrom: extractor_common.ini, ROOT:assets/templates/energyUse.template, ROOT:assets/templates/stopProductionOnNoReserver.template, ROOT:assets/templates/productionConfigUse.template
name: extractorT2
overrideAndReplace:extractorT2
displayLocaleKey:extractor
price:0, cash=2100
maxHp: 1000
borrowResourcesWhileBuilt: energyCreditsNet=4, cashNet=-12
techLevel: 2

[template_outageConfig]
@define reserveResource: energyCredits
@define outputNetResource1: cashNet
@define outputAmount1: 12
@define outputNetResource2: mineralsNet
@define outputAmount2: 0
@define outageTag: powerOff

[action_upgradeT3]
convertTo: extractorT3
price:0, cash=3000
isLocked:if not self.globalTeamTags(includes='${tech_economy1}')
isLockedMessage:Нужна технология (${name_economy1})
text: i:gui.actions.upgradeT3
description: i:units.extractor.upgrade.descriptionT3
displayType: upgrade
buildSpeed: 0.0003
iconExtraImage: SHARED:icon_upgrade_top.png
iconExtraColor: #AAFFFFFF

[animation_idle]
KeyframeTimeScale: 0.5

[graphics]
image:        extractor_t2.png




[ai]
upgradedFrom: extractorT1



