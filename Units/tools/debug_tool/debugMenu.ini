[core]
dont_load:true
@memory currentMenu: number
@global defaultPage: 1

[template_integratedInNavigator]
@define menuID:1
@define isVisibleExtraLogic:
isVisible: if (memory.currentMenu == ${menuID} or self.isControlledByAI()) ${isVisibleExtraLogic}

[hiddenAction_forceSetToDefaultPage]
autoTriggerOnEvent:created
setUnitMemory:currentMenu=${defaultPage}

[template_showMenuAction]
@define menuID:1
text: ${name}
isGuiBlinking: if memory.currentMenu == ${menuID}
iconExtraColor: #00fc69
displayType: infoOnly
pos:-1
isVisible:false
buildSpeed:0s
highPriorityQueue: true
playSoundToPlayerOnQueue:ROOT:ASSETS/sounds/ui_button_pressed.ogg
setUnitMemory:currentMenu=select(memory.currentMenu != ${menuID}, ${menuID}, -1)

[action_showMenu1ToPlayer]
@copyFromSection: template_showMenuAction
@define menuID:1
@define name: Ресурсы
isVisible: true

[action_showMenu2ToPlayer]
@copyFromSection: template_showMenuAction
@define menuID:2
@define name: Теч
isVisible: true

[action_showMenu3ToPlayer]
@copyFromSection: template_showMenuAction
@define menuID:3
@define name: Фракции
isVisible: true

[action_showMenu4ToPlayer]
@copyFromSection: template_showMenuAction
@define menuID:4
@define name: Другое
isVisible: true
