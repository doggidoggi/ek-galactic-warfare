#Bug Melee by Luke Hoschke

[core]
copyFrom:ROOT:assets/templates/bio.template
name: EkZombieMeleeSmall
tags:ZOMBIE
class: CustomUnitMetadata
price: 300
maxHp: 600
armour: 15
mass: 140
displayText: Зомби
displayDescription: -Наносит урон с помощью быстрой атаки ближнего боя\n-Имеет саморегенерацию
techLevel: 1
buildSpeed: 0.1
#availableInDemo: true
radius: 5
displayRadius: 5
isBio: true
selfRegenRate:0.05
softCollisionOnAll: 12
numBitsOnDeath: 5
autoTriggerCooldownTime: 2s
autoTriggerCheckRate: every8Frames
@memory timer: float

[hiddenAction_disappear]
autoTrigger: if self.isOverwater()
deleteSelf:true

[hiddenAction_convertTeam]
autoTriggerOnEvent:created
switchToAggressiveTeam:true

[resource_zombie]
displayName:isZombie
hidden:true
displayRoundedDown:false
displayWhenZero:true

[hiddenAction_attackNear]
autoTrigger:if true and not self.hasActiveWaypoint()
addWaypoint_type: attackMove
addWaypoint_maxTime: 5s
addWaypoint_position_randomOffsetFromSelf: 100,100
[graphics]
total_frames: 8
image:       base.png
imageScale: 0.22
image_wreak: corpse.png
image_turret: NONE
image_shadow: AUTO
shadowOffsetX:1
shadowOffsetY:1
animation_moving_start: 0
animation_moving_end: 2
animation_moving_speed: 7
animation_idle_start: 3
animation_idle_end: 4
animation_idle_speed: 10
animation_idle_scale_start:1
animation_idle_scale_end:1.04
animation_idle_pingPong: true
animation_attack_start: 5
animation_attack_end: 7
animation_attack_speed: 7
lock_body_rotation_with_main_turret: true

[attack]
isMelee: true
canAttack: true
canAttackFlyingUnits: false
canAttackLandUnits:   true
canAttackUnderwaterUnits: false
isFixedFiring: true
turretSize: 20
turretTurnSpeed: 3
maxAttackRange: 9
shootDelay: 60

[turret_1]
x:0
y:0
recoilOffset:3
recoilOutTime:6
recoilReturnTime:18
shoot_sound:bug_attack
shoot_sound_vol:0.08

[projectile_1]
directDamage:23
areaDamage:0
areaRadius:20
life:50
instant:true
explodeEffect:NONE
mutatorX_ifUnitWithTags:INFANTRY
mutatorX_addResourcesAreaHit:zombie=10

[movement]
movementType: LAND
moveSpeed: 1.7
moveAccelerationSpeed: 0.07
moveDecelerationSpeed: 0.12
maxTurnSpeed: 8.5
turnAcceleration: 0.5
moveSlidingMode :true
moveIgnoringBody:true
moveSlidingDir:  181
reverseSpeedPercentage:0