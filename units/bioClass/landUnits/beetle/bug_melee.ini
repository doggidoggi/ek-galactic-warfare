#Bug Melee by Luke Hoshke
#Edited by Essential Strategy

[core]
copyFrom:ROOT:assets/templates/bio.template
name: beetle
class: CustomUnitMetadata
price:0, cash=300
maxHp: 550
mass: 500
overrideAndReplace: bugMelee
displayText: Beetle
displayText_ru: Кусака
displayDescription: -Quick medium insect\n-Attacks ground only\n-Self regenerate
displayDescription_ru: -Быстрый средний жук\n-Атакует только землю
techLevel: 1
buildSpeed: 0.005
#availableInDemo: true
radius: 8
displayRadius: 10
isBio: true
isBug: true
isUnrepairableUnit: true
numBitsOnDeath: 5
selfRegenRate:0.1
softCollisionOnAll: 12
effectOnDeath: CUSTOM:smallDeath

[action_evolve]
convertTo: hornedBeetle
price:0, biomass=1600
text: Metamorphosis
text_ru: Метаморфоза
description: -Increases HP and damage
description_es: -Incrementa los PV y el daño
displayType: upgrade
buildSpeed: 8s
pos: 0
whenBuilding_cannotMove: true
canPlayerCancel: false

[graphics]
total_frames: 5
image:        bug_melee.png
image_wreak:  bug_dead.png
image_shadow: AUTO
shadowOffsetX:0
shadowOffsetY:0
animation_moving_start: 0
animation_moving_end: 2
animation_moving_speed: 3
animation_idle_start: 0
animation_idle_end: 0
animation_idle_speed: 120
animation_idle_scale_start:1
animation_idle_scale_end:1.03
animation_idle_pingPong: true
animation_attack_start: 2
animation_attack_end: 4
animation_attack_speed: 4
lock_body_rotation_with_main_turret: true

[attack]
isMelee: true
canAttack: true
canAttackFlyingUnits: false
canAttackLandUnits:   true
canAttackUnderwaterUnits: false
isFixedFiring: true
turretSize: 20
turretTurnSpeed: 3
maxAttackRange: 9
shootDelay: 30

[turret_1]
x: 0
y: 0
shoot_sound:bug_attack
shoot_sound_vol:0.08
shoot_light:#FFccCCEE
recoilOffset: 3
recoilOutTime: 6
recoilReturnTime: 18

[projectile_1]
directDamage: 23
life: 50
instant: true
explodeEffect: NONE
armourIgnoreAmount: 7

[movement]
movementType: LAND
moveSpeed: 1.5
moveAccelerationSpeed: 0.07
moveDecelerationSpeed: 0.12
maxTurnSpeed: 8.5
turnAcceleration: 0.5
moveSlidingMode :true
moveIgnoringBody:true
moveSlidingDir:  181
reverseSpeedPercentage:0

#Bug Melee by Luke Hoshke