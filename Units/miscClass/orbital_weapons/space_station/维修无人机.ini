generation_credits:1
radius:8
tags:维修无人机
displayRadius:10
fogOfWarSightRange:14
canNotBeDamaged:true
canNotBeDirectlyAttacked:true
disableDeathOnZeroHp:false
isBio:false
nanoRangeForRepairIsMelee:true
canRepairBuildings:true
canRepairUnits:true
canReclaimResources:true
nanoRange:420
autoRepair:true
nanoRepairSpeed:0.6
nanoBuildSpeed:1.25
isBuilder:true
isUnselectable:true
disableAllUnitCollisions:true
energyMax:6
energyRegen:-0.00125
energyNeedsToRechargeToFull:true
autoTriggerCooldownTime:2s
[canBuild_canReclaim]
name:reclaim
pos:-1
[graphics]
drawLayer:air
total_frames:1
image:维修无人机.png
image_wreak:维修无人机死亡.png
image_turret:NONE
image_shadow:AUTO
shadowOffsetX:2
shadowOffsetY:2
imageScale:0.9
showHealthBar:false
[attack]
canAttack:false
canAttackFlyingUnits:false
canAttackLandUnits:false
canAttackUnderwaterUnits:false
isFixedFiring:false
maxAttackRange:320
turretTurnSpeed:9999999
shootDelay:0
[turret_1]
x:0
y:0
invisible:true
canShoot:false
canAttackFlyingUnits:false
canAttackLandUnits:false
canAttackUnderwaterUnits:false
[movement]
movementType:AIR
targetHeight:50
targetHeightDrift:1
moveSpeed:4.6
moveAccelerationSpeed:0.1
moveDecelerationSpeed:0.03
maxTurnSpeed:3.8
turnAcceleration:0.15
reverseSpeedPercentage:0

moveSlidingMode:true
slowDeathFall:true
slowDeathFallSmoke:true
[ai]
useAsBuilder:true
[hiddenAction_setCN]
autoTrigger:if self.hasParent(withTag='宙斯卫星')
setCustomTarget1:parent
[hiddenAction_build]
autoTrigger:if customTarget1.hasActiveWaypoint(type='repair')
addWaypoint_type:repair
addWaypoint_prepend:true
addWaypoint_target_fromReference:customTarget1.activeWaypointTarget
[hiddenAction_reclaim]
autoTrigger:if customTarget1.hasActiveWaypoint(type='reclaim') and not self.hasActiveWaypoint(type='reclaim')
addWaypoint_type:reclaim
addWaypoint_prepend:true
addWaypoint_target_fromReference:customTarget1.activeWaypointTarget
[hiddenAction_return]
autoTrigger:if not customTarget1.hasActiveWaypoint() or customTarget1.hasActiveWaypoint(type='move')
addWaypoint_type:loadInto
addWaypoint_prepend:true
addWaypoint_target_fromReference:customTarget1
[hiddenAction_return2]
autoTrigger:if self.isEnergyEmpty()
deleteSelf:true
[hiddenAction_dead]
autoTriggerOnEvent:destroyed
sendMessageTo:unitref customTarget1
sendMessageWithTags:IAMDEAD
[hiddenAction_能量恢复]
autoTrigger:if self.hasParent()
addEnergy:10