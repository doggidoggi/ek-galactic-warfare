[core]
copyFrom: banana_CC_base.template,ROOT:ASSETS/templates/hyperdrive.template
name: sanaCCFlying
class: CustomUnitMetadata
isBuilding: false
dieOnConstruct:true
nanoRange:0
isBuilder:true
buildSpeed: 1
selfBuildRate: 0
energyMax:          1
energyRegen:       0
tags: commandCenter,building,mech

[canBuild_1]
name:sanaCC

[hiddenAction_land]
autoTrigger: if self.queueSize(lessThan=1) and distanceBetween(self, self.activeWaypointTarget)<5 and not self.isMoving() and self.hasActiveWaypoint(type='build') and activeWaypointTarget.getAsMarker.nearestUnit(withinRange=10,withTag="building",relation="any")==self
teleportTo: self.activeWaypointTarget
alsoQueueAction:land_2

[hiddenAction_land_2]
convertTo:sanaCC
buildSpeed: 0.8s
highPriorityQueue: true
whenBuilding_temporarilyConvertTo: sanaCC
whenBuilding_cannotMove:true
canPlayerCancel:false

[graphics]
shadowOffsetX:0
shadowOffsetY:0

[attack]
canAttack:            false
canAttackFlyingUnits: false
canAttackLandUnits:   false
canAttackUnderwaterUnits: false
turretSize:      0
turretTurnSpeed: 100
maxAttackRange: 280
shootDelay:     60

[movement]
movementType: AIR
moveSpeed: 1.0
moveAccelerationSpeed: 0.07
moveDecelerationSpeed: 0.12
maxTurnSpeed: 6.5
turnAcceleration: 4.06
reverseSpeedPercentage:0
joinsGroupFormations: false
slowDeathFallSmoke: false
slowDeathFall: false
heightChangeRate: 6
