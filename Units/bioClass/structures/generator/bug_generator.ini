#Bug Generator by Luke Hoshke
#Edited by Essential Strategy

[core]
copyFrom:ROOT:assets/templates/bio.template
name: generator
class: CustomUnitMetadata
price: 1000
maxHp: 800
mass: 10000
displayText: Generator
displayText_es: Generador
displayDescription: -Generates income slowly
displayDescription_es: -Genera ingresos lentamente
overrideAndReplace: bugGenerator
generation_credits: 2
generation_delay: 40
footprint: 0,0,1,1
constructionFootprint:0,0,1,1
buildingToFootprintOffsetX:20
buildingToFootprintOffsetY:20
techLevel: 1
buildSpeed: 0.002
#availableInDemo: true
radius: 16
isBio: true
isBuilding: true
isUnrepairableUnit: true
selfRegenRate:0.1
selfBuildRate:0.002
softCollisionOnAll: 3

[action_upgradeT2]
convertTo: generatorT2
price:  1400
text: Upgrade - E2
text_es: Mejorar - E2
displayType: upgrade
buildSpeed: 0.0002
pos: 0.2

[graphics]
total_frames: 1
image:        bug_generator.png
image_wreak:  NONE
image_shadow: NONE
shadowOffsetX:1
shadowOffsetY:1
animation_idle_start: 0
animation_idle_end: 0
animation_idle_speed: 150
animation_idle_scale_start:1
animation_idle_scale_end:1.05
animation_idle_pingPong: true

[animation_build]
onActions: underConstructionWithLinkedBuiltTime
blendOut: 1s
body_0: {scale:0}
body_1: {scale:1.2}

[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits:   false
canAttackUnderwaterUnits: false
maxAttackRange: 0

[movement]
movementType: BUILDING
moveSpeed: 0
moveAccelerationSpeed: 0
moveDecelerationSpeed: 0
maxTurnSpeed: 0
turnAcceleration: 0

[ai]
buildPriority: 0.2
maxEachBase: 5

