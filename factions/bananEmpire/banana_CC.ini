[core]
copyFrom: banana_CC_base.template
name: sanaCC
class: CustomUnitMetadata
showInEditor: true

[canBuild_1]
name:          sanaBuilder, scout, EkmegaBuilder, setRally
pos: 1

[action_riseUp]
iconImage: ROOT:assets/ui/action_icons/area_shock.png
isVisible:true
