[core]
copyFrom: extractor_common.ini,ROOT:assets/templates/energyUse.template
name: extractorT1
displayLocaleKey: extractor
price: 700
maxHp: 800
techLevel: 1
buildSpeed: 0.0010
overrideAndReplace: extractor, extractorT1
borrowResourcesWhileBuilt: energyCreditsNet=12
generation_resources: credits=8
generation_active: if self.resource.energyCredits > 0
tags: energyUse

[action_upgradeT2]
convertTo: extractorT2
price:  1400
text: i:gui.actions.upgradeT2
description: i:units.extractor.upgrade.description
displayType: upgrade
buildSpeed: 0.0006
addResources: fakeincome=10
iconExtraImage: SHARED:icon_upgrade_top.png
iconExtraColor: #AAFFFFFF

[animation_idle]
onActions : idle
body_0s: {frame:0}
body_0.8s: {frame:3}
body_1.0s: {frame:3}

pingPong:true

[graphics]
image:        extractor.png




