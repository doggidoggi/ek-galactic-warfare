[core]
name: Asteroid1
displayText: Asteroid
class: CustomUnitMetadata
price: 1
maxHp: 1
mass: 50
buildSpeed: 1s
radius: 17
isBio: false
tags: asteroid
fogOfWarSightRange: 0
effectOnDeath: NONE
numBitsOnDeath: 0
hideScorchMark: true
explodeOnDeath: false
disableAllUnitCollisions: false
showOnMinimap: false
createOnAggressiveTeam: true
stayNeutral: true
isUnselectable: true
showInEditor: true

[hiddenAction_waypointAdd]
autoTriggerOnEvent: created
addWaypoint_type: move
addWaypoint_position_relativeOffsetFromSelf: 1000, 0

[hiddenAction_deletinOutside]
autoTrigger: if not self.isInMap()
deleteSelf: true

[hiddenAction_created]
autoTriggerOnEvent: created
requireConditional: if rnd(0,100) < 10
convertTo: Asteroid2
[hiddenAction_created2]
@copyFromSection: hiddenAction_created
requireConditional: if rnd(0,100) > 10 and rnd(0,100) < 20
convertTo: Asteroid1
[hiddenAction_created3]
@copyFromSection: hiddenAction_created
requireConditional: if rnd(0,100) > 20 and rnd(0,100) < 30
convertTo: Asteroid2
[hiddenAction_created4]
@copyFromSection: hiddenAction_created
requireConditional: if rnd(0,100) > 30 and rnd(0,100) < 40
convertTo: Asteroid1
[hiddenAction_created5]
@copyFromSection: hiddenAction_created
requireConditional: if rnd(0,100) > 40 and rnd(0,100) < 50
convertTo: Asteroid2
[hiddenAction_created6]
@copyFromSection: hiddenAction_created
requireConditional: if rnd(0,100) > 50 and rnd(0,100) < 60
convertTo: Asteroid1
[hiddenAction_created7]
@copyFromSection: hiddenAction_created
requireConditional: if rnd(0,100) > 60 and rnd(0,100) < 70
convertTo: Asteroid2
[hiddenAction_created8]
@copyFromSection: hiddenAction_created
requireConditional: if rnd(0,100) > 70 and rnd(0,100) < 70.05
convertTo: Asteroid1
[hiddenAction_created9]
@copyFromSection: hiddenAction_created
requireConditional: if rnd(0,100) > 71 and rnd(0,100) < 90
convertTo: Asteroid2
[hiddenAction_created10]
@copyFromSection: hiddenAction_created
requireConditional: if rnd(0,100) > 90
convertTo: Asteroid1

[arm_1]
x: 0
y: 0
image_end: body1.png
spinRate: 0.1

[graphics]
total_frames: 1
imageScale: 0.5
turretImageScale: 0.5
image:        ROOT:assets/null.png
image_wreak:  NONE
image_shadow: NONE
shadowOffsetX: 1
shadowOffsetY: 1
showHealthBar: false
showShotDelayBar: false
showQueueBar: false
showTransportBar: false
rotate_with_direction: true
disableLowHpFire: true
disableLowHpSmoke: true
icon_zoomed_out: NONE

[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits: false
canAttackUnderwaterUnits: false
turretMultiTargeting: false

[movement]
movementType: AIR
moveSpeed:0.1
targetHeight:200
moveAccelerationSpeed: 0.01
moveDecelerationSpeed: 0.01
reverseSpeedPercentage: 0.01
maxTurnSpeed: 0.01
turnAcceleration: 0.01
moveSlidingMode: false
moveIgnoringBody: true
targetHeightDrift: 0
joinsGroupFormations: false
