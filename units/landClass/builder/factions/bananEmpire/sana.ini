limitingRange:150

[leg_1]
x: -13
y: 13
attach_x: -4
attach_y: 4
moveSpeed:2.5
rotateSpeed: 78
heightSpeed: 0.8
resetAngle:25
#draw_foot_on_top: true
dust_effect: false
image_leg:  leg.png
image_foot: foot.png
holdDisMin:20
holdDisMax:40
hardLimit: 50
endDirOffset:135
favourOppositeSideNeighbours: true
holdDisMin_maxMovingLegs:2
moveWarmUp:1
estimatingPositionMultiplier:0.8
[leg_2]
x: 13
y: 13
attach_x: 4
attach_y: 4
copyFrom: 1
endDirOffset:225
[leg_3]
x: -13
y: -13
attach_x: -4
attach_y: -4
copyFrom: 1
endDirOffset:45
[leg_4]
x: 13
y: -13
attach_x: 4
attach_y: -4
copyFrom: 1
endDirOffset:-45
[movement]
movementType: LAND
moveSpeed: 0.80
moveAccelerationSpeed: 0.05
moveDecelerationSpeed: 1
maxTurnSpeed: 12
turnAcceleration: 0.7
moveSlidingMode : false
moveIgnoringBody: false
reverseSpeedPercentage: 0.3

[ai]
useAsBuilder: true
