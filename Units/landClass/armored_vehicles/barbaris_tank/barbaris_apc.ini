[core]
copyFrom:ROOT:assets/templates/vehicle.template,ROOT:assets/templates/ammo/arty200mm.template
name:EkBarbaris
displayText:БТР "Барбарис"
displayDescription:-БТР\n-Может ходить по земле и воде\n-Медленный\n-Вмещает 15 пехотинцев
price:0, cash=14500
maxHp:1100
mass:9999
techLevel:2
armour:10
buildSpeed:30s
radius: 28
displayRadius: 28
energyMax:100
energyRegen:0.075
energyNeedsToRechargeToFull:true
softCollisionOnAll:0
fogOfWarSightRange:15
maxTransportingUnits:2
transportUnitsRequireTag:infantry
transportUnitsKillOnDeath:false
transportUnitsBlockOtherTransports:false
transportUnitsOnTeamChangeKeepCurrentTeam:true
transportUnitsCanUnloadUnits:if self.numberOfAttachedUnits(withTag="filled") < 1 and not self.isControlledbyAi() or self.hp() < 5
transportSlotsNeeded: 100

[hiddenAction_addCrew]
autoTriggerOnEvent:created
addUnitsIntoTransport:EkInfantryGrunt*2

[attachment_landing]
x: 0
y: -6.6
idleDir:0
onCreateSpawnUnitOf:landing
isVisible:true
keepAliveWhenParentDies:false
canBeAttackedAndDamaged:true
isUnselectable:false
lockRotation:true
setDrawLayerOnTop:true
lockLegMovement:true
onParentTeamChangeKeepCurrentTeam:false

[action_unload]
autoTrigger: if self.hp < 9 or self.hasTakenDamage(withinSeconds=1) or self.isOnNeutralTeam()
text:Разгрузить %{int(self.attachment(withTag="landing").TransportingCount)}/15
isLocked: if self.numberOfAttachedUnits(withTag="filled") < 1
isLockedMessage:Невозможно разгрузиться, пока в транспортном отсеке нет десанта
temporarilyAddTags:unload
alsoQueueAction:resetLanding
buildSpeed:0s
pos:0
alwaysSinglePress:true

[hiddenAction_resetLanding]
autoTrigger:if self.numberOfAttachedUnits(withTag="filled") < 1
buildSpeed:1s
temporarilyRemoveTags:unload

[action_trigger_Water]
autoTrigger:if self.overWater()
isVisible:false
convertTo:EkBarbarisWater

[graphics]
total_frames:3
frame_width:32
icon_zoomed_out:unit_icon_largetank.png
image:yukana.png
image_wreak:yukana_dead.png
image_turret:lancer_mg.png
image_shadow:AUTO
shadowOffsetX:2
shadowOffsetY:2
animation_moving_start:0
animation_moving_end:2
animation_moving_speed:2
teamColorsOnTurret:true

[attack]
canAttack:true
canAttackFlyingUnits:false
canAttackLandUnits:true
canAttackUnderwaterUnits:false
turretSize:15
turretTurnSpeed:2
turretMultiTargeting:true
maxAttackRange:180

[turret_1]
x:0
y:2
size:7
delay:6
idleDir:0
turnSpeed:8.0
turnSpeedAcceleration:0
shoot_sound:gun_fire
shoot_sound_vol:0.15
shoot_flame:CUSTOM:EkMuzzleTiny
shoot_light:#FFFFCC66
warmup:0
energyUsage:1.1
canAttackFlyingUnits:false
canAttackLandUnits:true
canAttackUnderwaterUnits:false
projectile:1
recoilOffset:0

[projectile_1]
directDamage:6
life:70
speed:10
image:projectile_stalkertracer.png
drawSize:0.75
deflectionPower:-1
tags:EKAmmoSmall
explodeEffect:CUSTOM:explodeSmall

[effect_EkMuzzleTiny]
life:8
attachedToUnit:true
image:muzzle_tiny.png
total_frames:3
animateFrameStart:0
animateFrameEnd:2
animateFrameSpeed:0.5
fadeOut:false
scaleFrom:1.75
scaleTo:1.75
yOffsetRelative:6
xOffsetRelative:0

[effect_explodeSmall]
life:25
attachedToUnit:true
image:explode_big2.png
scaleFrom:0.3
scaleTo:0.3
total_frames:14
animateFrameStart:0
animateFrameEnd:13
animateFrameSpeed:0.5
fadeOut:false
yOffsetRelative:0
xOffsetRelative:0

[effect_EkMuzzleLarge]
life:30
showInFog:true
attachedToUnit:true
image:muzzle_large.png
total_frames:5
animateFrameStart:0
animateFrameEnd:4
animateFrameSpeed:0.4
scaleFrom:1.8
scaleTo:1.8
fadeOut:false
yOffsetRelative:12

[movement]
movementType:HOVER
moveSpeed:0.5
moveAccelerationSpeed:0.07
moveDecelerationSpeed:0.17
maxTurnSpeed:1.0
turnAcceleration:0.08
moveSlidingMode:false
moveIgnoringBody:false

[ai]
disableUse:true