[core]
name: sanaBuilder
copyFrom: ROOT:assets/templates/builder.template
displayText: Имперский Строитель 
displayDescription: -Строит и ремонтирует здания\n-Не может атаковать

[canBuild_base]
name: sanaCCFake,EkBananaFlag
pos:100

[graphics]
imageScale: 1
total_frames: 1
teamColorsOnTurret: true
image: bodyAltArmored.png
image_wreak:  body_dead.png
#scaleImagesTo: 20
#scaleTurretImagesTo: 9
image_shadow: AUTO
shadowOffsetX:0
shadowOffsetY:4

[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits:   false
canAttackUnderwaterUnits: false
[turret_body]
x: 0
y: 0
idleDirReversing:0
canShoot:false
barrelX: -14
barrelY: 7
invisible:true
turnSpeed:1.3
turnSpeedAcceleration: 0.1
recoilOffset:-1
recoilOutTime:2
recoilReturnTime:10
[turret_nanoTurret]
x: 5
y: -5
attachedTo: body
slave:false
barrelX:-4
barrelY:27
canShoot: false
turnSpeed: 3
turnSpeedAcceleration: 0.2
isMainNanoTurret: true
image:builderToolArmored.png
idleDir:35
idleDirReversing:35
