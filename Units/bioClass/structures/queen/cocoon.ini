#Cocoon by Essential Strategy
#Graphics by SUSHIMAKI

[core]
copyFrom:ROOT:ASSETS/templates/bio.template
name: cocoon
showInEditor: false
class: CustomUnitMetadata
price: 1000
maxHp: 2000
mass: 10000
displayText: Cocoon
displayText_es: Capullo
displayDescription: -Queen's metamorphosis state
displayDescription_es: -Estado de metamorfosis de la reina
footprint: -1,-1,1,1
constructionFootprint: -1,-1,1,3
techLevel: 2
buildSpeed: 0.001
selfBuildRate:0.001
selfRegenRate:0.15
#availableInDemo: true
radius: 28
isBio: true
isBug: true
isBuilding: true
isUnrepairableUnit: true
softCollisionOnAll: 3
energyMax: 100
energyRegen: 0

[hiddenAction_evolveTime]
autoTrigger: if self.energy(greaterThan=0)
buildSpeed: 0s
addEnergy: -1

[hiddenAction_autoEvolve]
convertTo: queenT2
autoTrigger: if self.energy(empty=true)
buildSpeed: 0s

[graphics]
total_frames: 1
image:  cocoon.png
image_back: NONE
image_wreak:  NONE
image_shadow: NONE
shadowOffsetX:1
shadowOffsetY:1

[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits:   false
canAttackUnderwaterUnits: false
maxAttackRange: 0

[movement]
movementType: BUILDING
moveSpeed: 0
moveAccelerationSpeed: 0
moveDecelerationSpeed: 0
maxTurnSpeed: 0
turnAcceleration: 0

[ai]
upgradedFrom: queen
useAsBuilder: true

