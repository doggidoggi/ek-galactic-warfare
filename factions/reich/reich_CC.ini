[action_showLore]
@copyFromSection: template_showLoreAction
description: ОЗД — фракция, возникшая из остаточных сил тоталитарного режима, существовавшего в Империи. Она стремится вернуть былую мощь и эксплуатацию технологий и ресурсов галактики для укрепления своей идеологии превосходства.\nИдеология: Национализм, милитаризм и расовая чистота. ОЗД пропагандирует идею превосходства определённых рас и культур, стремясь установить новый порядок, основанный на жестком контроле и иерархии.\nВоенные силы: Массивные армии, оснащённые тяжёлыми вооружениями, бронированными боевыми машинами.\nОсобенности: Строгая иерархическая структура, высокая военная дисциплина. Экономика базируется на принудительном труде и экспансивной промышленности.

