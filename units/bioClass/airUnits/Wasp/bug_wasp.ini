#Bug Wasp by Luke Hoshke
#Edited by Essential Strategy

[core]
copyFrom:ROOT:assets/templates/bio.template
name: wasp
class: CustomUnitMetadata
price:0, biomass=800
maxHp: 250
mass: 1200
displayText: Wasp
displayText_es: Avispa
displayDescription: -Quick response insect\n-Attacks ground and air\n-Self regenerate
displayDescription_es: -Insecto de respuesta rápida\n-Ataca a tierra y aire\n-Auto-regeneración
overrideAndReplace: bugWasp
techLevel: 1
buildSpeed: 0.002
#availableInDemo: true
radius: 9
displayRadius: 11
isBio: true
isBug: true
isUnrepairableUnit: true
selfRegenRate:0.1
softCollisionOnAll: 12
explodeOnDeath: false
explodeOnDeathGroundCollosion: false


[action_evolve]
convertTo: giantWasp
price:0, biomass=1600
text: Metamorphosis
text_es: Metamorfosis
description: -Increases HP, damage and range but removes the anti-air attack
description_es: -Incrementa los PV, el daño y el rango pero remueve el ataque antiaéreo
displayType: upgrade
buildSpeed: 20s
pos: 0
whenBuilding_cannotMove: true
canPlayerCancel: false

[graphics]
total_frames: 2
image:        bug_wasp.png
image_wreak:  wasp_dead.png
image_shadow: AUTO
shadowOffsetX:1
shadowOffsetY:1
animation_moving_start: 0
animation_moving_end: 1
animation_moving_speed: 2
animation_idle_start: 0
animation_idle_end: 1
animation_idle_speed: 2
lock_body_rotation_with_main_turret: true

[attack]
canAttack: true
canAttackFlyingUnits: true
canAttackLandUnits:   true
canAttackUnderwaterUnits: false
isFixedFiring: true
turretSize: 10
turretTurnSpeed: 9
maxAttackRange: 170
shootDelay: 70

[turret_1]
x: 0
y: 0
recoilOffset: -5
recoilOutTime: 13
recoilReturnTime: 13
shoot_flame: smoke

[projectile_1]
directDamage: 25
life: 80
speed: 7
color: #00ff00
drawSize: 2
lightColor: #00ff00
lightSize: 0.3

[movement]
movementType: AIR
moveSpeed: 1.9
moveAccelerationSpeed: 0.04
moveDecelerationSpeed: 0.07
maxTurnSpeed: 5.5
turnAcceleration: 0.5
moveSlidingMode :true
moveIgnoringBody:true
moveSlidingDir:  181
reverseSpeedPercentage:0

