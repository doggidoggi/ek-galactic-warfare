[hiddenAction_BioChoose]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="BIO") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
addGlobalTeamTags: READY, BIO
convertTo:bugHive
spawnUnits: Ek_advertisement(spawnSource=getOffsetAbsolute)
addResources: fakeincome=62
[hiddenAction_convertmoney]
autoTrigger: if self.tags(includes="READY") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
convertResource_from: credits
convertResource_to: ccredits
convertResource_maxAmount: 3000000
addResources: fakeincome=62
[graphics]
