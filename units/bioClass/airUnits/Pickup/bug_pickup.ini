#Bug Pickup by Luke Hoshke
#Edited by Essential Strategy

[core]
copyFrom:ROOT:assets/templates/bio.template
name: pickup
class: CustomUnitMetadata
price:0, cash=600
maxHp: 450
mass: 1200
displayText: Pickup
displayText_es: Receptor
displayDescription: -Transports up to 2 units\n-Self regenerate
displayDescription_es: -Transporta hasta 2 unidades\n-Auto-regeneración
overrideAndReplace: bugPickup
techLevel: 1
buildSpeed: 0.002
#availableInDemo: true
radius: 9
isUnrepairableUnit: true
displayRadius: 11
isBio: true
isBug: true
selfRegenRate:0.1
softCollisionOnAll: 12
maxTransportingUnits: 2
transportUnitsHealBy: 0.14
explodeOnDeath: false
explodeOnDeathGroundCollosion: false


[action_evolve]
convertTo: axialPickup
price:0, biomass=900
text: Metamorphosis
text_es: Metamorfosis
description: -Increases HP and adds capacity to carry more units
description_es: -Incrementa los PV y añade la capacidad de llevar más unidades
displayType: upgrade
buildSpeed: 10s
pos: 0
whenBuilding_cannotMove: true
canPlayerCancel: false

[graphics]
total_frames: 2
image:        bug_pickup.png
image_wreak:  bumblebee_dead.png
image_shadow: AUTO
shadowOffsetX:1
shadowOffsetY:1
animation_moving_start: 0
animation_moving_end: 1
animation_moving_speed: 2
animation_idle_start: 0
animation_idle_end: 1
animation_idle_speed: 6
animation_idle_scale_start:1
animation_idle_scale_end:1.03
animation_idle_pingPong: true

[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits:   false
canAttackUnderwaterUnits: false
maxAttackRange: 0

[movement]
movementType: AIR
moveSpeed: 1.8
moveAccelerationSpeed: 0.07
moveDecelerationSpeed: 0.12
maxTurnSpeed: 5.5
turnAcceleration: 0.5
moveSlidingMode :true
moveIgnoringBody:true
moveSlidingDir:  181
landOnGround: true

