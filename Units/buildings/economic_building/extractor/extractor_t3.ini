[core]
copyFrom: extractor_common.ini, ROOT:assets/templates/energyUse.template, ROOT:assets/templates/stopProductionOnNoReserver.template, ROOT:assets/templates/productionConfigUse.template
name: extractorT3
overrideAndReplace: extractorT3, extractorT3_overclocked, extractorT3_reinforced
displayLocaleKey: extractor
price:0, cash=7000
maxHp:2000
techLevel:2
buildSpeed:0.0010
borrowResourcesWhileBuilt: energyCreditsNet=6, cashNet=-16
mass:9000
footprint:0,0,0,0
constructionFootprint:0,0,0,0
radius:18
displayRadius:20
isBuilding:true
placeOnlyOnResPool:true
numBitsOnDeath:16
hideScorchMark:true
effectOnDeath:resourcePoolSmoke
explodeTypeOnDeath:buildingNoShockwaveOrSmoke

[template_outageConfig]
@define reserveResource: energyCredits
@define outputNetResource1: cashNet
@define outputAmount1: 16
@define outputNetResource2: mineralsNet
@define outputAmount2: 0
@define outageTag: powerOff

[animation_idle]
KeyframeTimeScale:0.33
onActions:idle
body_0s:{frame:0}
body_0.8s:{frame:3}
body_1.0s:{frame:3}
pingPong:true
[graphics]
image:extractor_t3.png
total_frames:4
image_back:extractor_back.png
image_back_always_use_full_image:true
[attack]
canAttack:false
canAttackFlyingUnits:false
canAttackLandUnits:false
canAttackUnderwaterUnits:false
maxAttackRange:0
[movement]
movementType:NONE
moveSpeed:0
moveAccelerationSpeed:0.01
moveDecelerationSpeed:0.01
maxTurnSpeed:0
turnAcceleration:0.1
[ai]
upgradedFrom: extractorT2
[action_drill]
displayType: upgrade
convertTo:EkResourceDrill
isLocked:if not self.globalTeamTags(includes='${tech_economy2}')
isLockedMessage:Нужна технология (${name_economy2})
price:0, cash=6000
text:[УЛУЧШЕНИЕ]
textAddUnitName:EkResourceDrill
descriptionAddFromUnit:EkResourceDrill
buildSpeed:0.00025