
[core]
copyFrom:ROOT:ASSETS/templates/bio.template, ROOT:ASSETS/templates/nest.template
name: nest
class: CustomUnitMetadata
overrideAndReplace: bugNest
price: 1200
maxHp: 800
mass: 10000
displayText: Nest
displayText_ru: Гнездо
displayDescription: -Generates ground insects
displayDescription_ru: -Производит жуков
footprint: -1,-1,1,1
constructionFootprint: -1,-1,1,3
techLevel: 1
buildSpeed: 0.002
selfBuildRate:0.002
#availableInDemo: true
radius: 30
isBio: true
isBug: true
isUnrepairableUnit: true
isBuilding: true
selfRegenRate:0.1
softCollisionOnAll: 3
exit_x:0
exit_y:-1
unitsSpawnedOnDeath: kusaka*3
[action_void]
isVisible: true
isLocked: true
displayType: InfoOnlyNoBox
isLockedMessage:
pos: 0
buildSpeed: 0
[canBuild_1]
name: setRally, spore, smallBeetle, spitter, generatorBug
pos: 0.2

[action_open]
convertTo: openNest
price: credits=600, crystalline=800
text: Open Nest
text_es: Nido Abierto
description: -Ables the nest to generate air insects, but can not generate ground insects
description_es: -Permite al nido generar insectos de aire, pero no puede generar insectos de tierra
displayType: upgrade
buildSpeed: 0.002
pos: 0

[action_upgradeT2]
convertTo: nestT2
price: credits=1000, crystalline=500
text: Upgrade - E2
description: -Ables the nest to generate stronger insects
description_es: -Permite al nido generar insectos más fuertes
displayType: upgrade
buildSpeed: 0.001
pos: 0.1
#whenBuilding_playAnimation: upgrade

[graphics]
total_frames: 1
image:        nest_front.png
image_back:   nest_back.png
image_wreak:  NONE
image_shadow: NONE
shadowOffsetX:1
shadowOffsetY:1
animation_idle_start: 0
animation_idle_end: 0
animation_idle_speed: 150
animation_idle_scale_start:1
animation_idle_scale_end:1.05
animation_idle_pingPong: true

[animation_build]
onActions: underConstructionWithLinkedBuiltTime
blendOut: 1s
body_0: {scale:0}
body_1: {scale:1.2}

#[animation_upgrade]
#blendIn: 1s
#blendOut: 1s
#body_0: {scale:1}
#body_1: {scale:1.4}

[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits:   false
canAttackUnderwaterUnits: false
maxAttackRange: 0

[movement]
movementType: BUILDING
moveSpeed: 0
moveAccelerationSpeed: 0
moveDecelerationSpeed: 0
maxTurnSpeed: 0
turnAcceleration: 0

[ai]
buildPriority: 0.25
noneInBaseExtraPriority: 0.2
noneGlobalExtraPriority: 0.3
maxEachBase: 1