[core]
copyFrom: banana_CC_base.template
name: sanaCCt2
displayText: Флюксенбург T2
displayDescription: -Бронированная столица Банановой Империи\n-Имеет радар\n-Атакует во врем полета
class: CustomUnitMetadata
tags: commandCenter,building,mech,radar,detect
showInEditor: true

[canBuild_1]
name:          sanaBuilder, scout, EkmegaBuilder, setRally
pos: 1

[action_riseUp]
iconImage: ROOT:/ASSETS/ui/action_icons/areaShockIcon.png
isVisible:true
isActive:true
text:Поднять здание
