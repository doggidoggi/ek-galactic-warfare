[core]
copyFrom:ROOT:assets/templates/bio.template
name: spitter
class: CustomUnitMetadata
price: biomass=650
maxHp: 380
mass: 1200
isUnrepairableUnit: true
displayText: Spitter
displayText_ru: Плевака
displayDescription: -Ranged insect with fast attack\n-Attacks ground and air
displayDescription_ru: -Плевака атакует быстрыми атаками средней дистанции\n-Может атаковать землю и воздух
overrideAndReplace: bugRanged
techLevel: 1
buildSpeed: 0.002
#availableInDemo: true
radius: 9
displayRadius: 11
isBio: true
isBug: true
selfRegenRate:0.1
softCollisionOnAll: 12
effectOnDeath: CUSTOM:smallDeath

[action_evolve]
convertTo: megaSpitter
price: 7000
text: Metamorphosis
text_es: Metamorfosis
description: -Increases HP, damage and range
description_es: -Incrementa los PV, el daño y el rango
displayType: upgrade
buildSpeed: 8s
pos: 0
whenBuilding_cannotMove: true
canPlayerCancel: false

[graphics]
total_frames: 6
image:        bug_ranged.png
image_wreak: bug_ranged_dead.png
image_shadow: AUTO
shadowOffsetX:1
shadowOffsetY:1
animation_moving_start: 0
animation_moving_end: 2
animation_moving_speed: 3
animation_idle_start: 0
animation_idle_end: 0
animation_idle_speed: 80
animation_idle_scale_start:1
animation_idle_scale_end:1.03
animation_idle_pingPong: true
animation_attack_start: 2
animation_attack_end: 5
animation_attack_speed: 3
lock_body_rotation_with_main_turret: true

[attack]
canAttack: true
canAttackFlyingUnits: true
canAttackLandUnits:   true
canAttackUnderwaterUnits: false
isFixedFiring: true
turretSize: 15
turretTurnSpeed: 9
maxAttackRange: 170
shootDelay: 60

[turret_1]
x: 0
y: 0
recoilOffset: -3
recoilOutTime: 6
recoilReturnTime: 18

[projectile_1]
directDamage: 25
life: 80
speed: 7
lightColor: #00ff00
lightSize: 0.3
explodeEffect:CUSTOM:spittle*6

[movement]
movementType: LAND
moveSpeed: 1.1
moveAccelerationSpeed: 0.07
moveDecelerationSpeed: 0.12
maxTurnSpeed: 5.5
turnAcceleration: 0.5
moveSlidingMode :true
moveIgnoringBody:true
moveSlidingDir:  181

