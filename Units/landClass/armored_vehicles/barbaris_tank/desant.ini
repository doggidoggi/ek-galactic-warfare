[core]
name:landing
displayText: Landing
showInEditor:false
price: 0
maxHp:100
armour:1000
mass:100
buildSpeed: 10s
radius:10
disableAllUnitCollisions:true
isUnselectable:true
isUnselectableAsTarget:false
canNotBeDirectlyAttacked:true
canNotBeDamaged:true
stayNeutral:false
maxTransportingUnits:15
transportUnitsRequireTag:infantry
transportUnitsCanUnloadUnits:true
transportUnitsOnTeamChangeKeepCurrentTeam:true
tags:landing
exit_heightOffset:-6.6

[hiddenAction_filled]
autoTriggerCheckRate: every8Frames
autoTrigger: if self.transportingCount() > 0
temporarilyAddTags:filled

[hiddenAction_empty]
autoTriggerCheckRate: every8Frames
autoTrigger: if self.transportingCount() < 1
temporarilyRemoveTags:filled
 
[hiddenAction_unload]
autoTrigger:if parent.tags(includes='unload')
forceUnloadTransportNow:true

[graphics]
total_frames: 1
image:ROOT:/assets/null.png
image_turret: NONE
imageScale:1
showTransportBar:true

[attachment_soldier1]
canBeAttackedAndDamaged:true
isVisible:false
keepAliveWhenParentDies:false
canAttack: false
deattachIfWantingToMove: false
addTransportedUnits: true
isUnselectable:true
resetRotationWhenNotAttacking:true
x: 2.7
y: 3
idleDir:-90

[attachment_soldier2]
y: -1
@copyFromSection:attachment_soldier1

[attachment_soldier3]
x: -2.7
y: 3
idleDir:90
@copyFromSection:attachment_soldier1

[attachment_soldier4]
y: -1
@copyFromSection:attachment_soldier3

[attachment_soldier5]
y: -4
@copyFromSection:attachment_soldier1

[attachment_soldier6]
y: -4
@copyFromSection:attachment_soldier3

[attachment_soldier7]
y: -8
@copyFromSection:attachment_soldier1

[attachment_soldier8]
y: -8
@copyFromSection:attachment_soldier3

[attachment_soldier9]
y: -12
@copyFromSection:attachment_soldier1

[attachment_soldier10]
y: -12
@copyFromSection:attachment_soldier3

[attack]
canAttack:false

[movement]
movementType:LAND
moveSpeed: 0

[ai]
useAsTransport:true