[core]
name:energyController
showInEditor:false
maxHp:1
mass:0
price:0, cash=0
radius:0
onNewMapSpawn:mapCenter_eachActiveTeam
fogOfWarSightRange:0
canNotBeDirectlyAttacked:true
isUnselectable:true
ignoreInUnitCapCalculation:true
hideScorchMark:true
disableAllUnitCollisions:true

[resource_marketCycle]
hidden:true

[hiddenAction_dynamicEnergyCreditNet]
autoTriggerCheckRate: every4Frames
autoTrigger: true
setResourcesWithLogic: energyCredits = self.resource.energyCredits + self.resource.energyCreditsNet, cash = self.resource.cash + self.resource.cashNet, minerals = self.resource.minerals + self.resource.mineralsNet, alloys = self.resource.alloys + self.resource.alloysNet, scientificPotential = self.resource.scientificPotential + self.resource.scientificPotentialNet, marketSaturation = self.resource.marketSaturation + self.resource.marketSaturationNet

[hiddenAction_checkEnergyCredits]
autoTriggerCheckRate: everyFrame
autoTrigger: if self.resource.energyCredits < 0 and self.resource.energyCreditsNet > 1
resourceAmount: energyCredits
resourceAmount_setValue: 0

[hiddenAction_checkAlloys]
autoTriggerCheckRate: everyFrame
autoTrigger: if self.resource.alloys < 0 and self.resource.alloysNet > 1
resourceAmount: alloys
resourceAmount_setValue: 0

[hiddenAction_checkMinerals]
autoTriggerCheckRate: everyFrame
autoTrigger: if self.resource.minerals < 0 and self.resource.mineralsNet > 1
resourceAmount: minerals
resourceAmount_setValue: 0

[hiddenAction_checkCash]
autoTriggerCheckRate: everyFrame
autoTrigger: if self.resource.cash < 0 and self.resource.cashNet > 1
resourceAmount: cash
resourceAmount_setValue: 0

[hiddenAction_checkScientificPotential]
autoTriggerCheckRate: everyFrame
autoTrigger: if self.resource.scientificPotential < 0 and self.resource.scientificPotentialNet > 1
resourceAmount: scientificPotential
resourceAmount_setValue: 0

[hiddenAction_checkMarketSaturation]
autoTriggerCheckRate: everyFrame
autoTrigger: if self.resource.marketSaturation < 0 and self.resource.marketSaturationNet > 1
resourceAmount: marketSaturation
resourceAmount_setValue: 0

[hiddenAction_worldMarketInit]
autoTriggerOnEvent: created
resourceAmount: marketCycle
resourceAmount_setValue:0
addGlobalTeamTags: worldMarketNormal

[hiddenAction_worldMarketStep]
autoTrigger: if true
addResources: marketCycle=0.001

[hiddenAction_worldMarketReset]
autoTrigger: if self.resource(type='marketCycle',greaterThan=4)
resourceAmount: marketCycle
resourceAmount_setValue:0

[hiddenAction_worldMarketBoom]
autoTrigger: if self.resource(type='marketCycle',lessThan=1) and not self.globalTeamTags(includes='worldMarketBoom')
removeGlobalTeamTags: worldMarketCrash, worldMarketLow, worldMarketNormal, worldMarketHigh
addGlobalTeamTags: worldMarketBoom

[hiddenAction_worldMarketHigh]
autoTrigger: if self.resource(type='marketCycle',greaterThan=0,lessThan=2) and not self.globalTeamTags(includes='worldMarketHigh')
removeGlobalTeamTags: worldMarketCrash, worldMarketLow, worldMarketNormal, worldMarketBoom
addGlobalTeamTags: worldMarketHigh

[hiddenAction_worldMarketNormal]
autoTrigger: if self.resource(type='marketCycle',greaterThan=1,lessThan=3) and not self.globalTeamTags(includes='worldMarketNormal')
removeGlobalTeamTags: worldMarketCrash, worldMarketLow, worldMarketHigh, worldMarketBoom
addGlobalTeamTags: worldMarketNormal

[hiddenAction_worldMarketLow]
autoTrigger: if self.resource(type='marketCycle',greaterThan=2,lessThan=4) and not self.globalTeamTags(includes='worldMarketLow')
removeGlobalTeamTags: worldMarketCrash, worldMarketNormal, worldMarketHigh, worldMarketBoom
addGlobalTeamTags: worldMarketLow

[hiddenAction_worldMarketCrash]
autoTrigger: if self.resource(type='marketCycle',greaterThan=3) and not self.globalTeamTags(includes='worldMarketCrash')
removeGlobalTeamTags: worldMarketLow, worldMarketNormal, worldMarketHigh, worldMarketBoom
addGlobalTeamTags: worldMarketCrash

[hiddenAction_marketSaturationDecay]
autoTrigger: if self.resource(type='marketSaturation',greaterThan=0)
addResources: marketSaturation=-0.04

[attack]
canAttack: false

[graphics]
image: ROOT:assets/null.png

[movement]
movementType: NONE
moveSpeed: 0