[core]
copyFrom:ROOT:ASSETS/templates/bio.template
name: smallBeetle
class: CustomUnitMetadata
price: 200
maxHp: 80
mass: 500
isUnrepairableUnit: true
overrideAndReplace: bugMeleeSmall
displayText: Small Beetle
displayText_es: Escarabajo Pequeño
displayDescription: -Very harm insect with fast melee attack\n-Self regenerate
displayDescription_es: -Insecto muy débil con ataque rápido\n-Auto-regeneración
techLevel: 1
buildSpeed: 0.006
#availableInDemo: true
radius: 6
displayRadius: 8
isBio: true
selfRegenRate:0.1
softCollisionOnAll: 12
isBug: true
numBitsOnDeath: 5

[action_evolve]
convertTo: beetle
price: 300
text: Metamorphosis
text_es: Metamorfosis
description: -Increases HP and damage 
description_es: -Incrementa los PV y el daño
displayType: upgrade
buildSpeed: 4s
pos: 0
whenBuilding_cannotMove: true
canPlayerCancel: false

[graphics]
total_frames: 5
imageScale: 0.6
image:       bug_melee.png
image_wreak:  bug_melee_dead.png
image_shadow: AUTO
shadowOffsetX:1
shadowOffsetY:1
animation_moving_start: 0
animation_moving_end: 2
animation_moving_speed: 2
animation_idle_start: 0
animation_idle_end: 0
animation_idle_speed: 120
animation_idle_scale_start:1
animation_idle_scale_end:1.03
animation_idle_pingPong: true
animation_attack_start: 3
animation_attack_end: 4
animation_attack_speed: 4
lock_body_rotation_with_main_turret: true

[attack]
isMelee: true
canAttack: true
canAttackFlyingUnits: false
canAttackLandUnits:   true
canAttackUnderwaterUnits: false
isFixedFiring: true
turretSize: 20
turretTurnSpeed: 3
maxAttackRange: 9
shootDelay: 30

[turret_1]
x: 0
y: 0
shoot_sound:bug_attack
shoot_sound_vol:0.08
shoot_light:#FFccCCEE
recoilOffset: 3
recoilOutTime: 6
recoilReturnTime: 18

[projectile_1]
directDamage: 15
life: 50
instant: true
explodeEffect: NONE

[movement]
movementType: LAND
moveSpeed: 1.4
moveAccelerationSpeed: 0.07
moveDecelerationSpeed: 0.12
maxTurnSpeed: 8.5
turnAcceleration: 0.5
moveSlidingMode :true
moveIgnoringBody:true
moveSlidingDir:  181
reverseSpeedPercentage:0

