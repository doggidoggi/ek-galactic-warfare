price:                   0
text: Киберстан
description: \nОфициальный статус: Машинный фашизм.\nОни не ведут переговоров, потому что в их коде нет переменной "Компромисс". Их цель - превратить галактику в одну гигантскую, безмолвную таблицу данных, где нет места человеку, любви или свободе.
iconImage: ROOT:ASSETS/ui/faction_icons/cyberstan.png
buildSpeed:              2s
ai_isHighPriority:       false
temporarilyAddTags: READY, CYBERSTAN
temporarilyRemoveTags: NOTREADY
showMessageToAllPlayers: Игрок %{self.playerName} готов (%{self.numberOfUnitsInAllTeams(withTag="READY")}/%{self.numberOfUnitsInAllTeams(withTag="COUNT")}) [Киберстан]!
allowMultipleInQueue:false
guiBuildUnit:cyberstanLogo

