showMessageToPlayer:[УЛЕЙ] *Агрессивный звук жуков*
buildSpeed:0s
playSoundToPlayer:ROOT:ASSETS/sounds/zergling.ogg:3.5

[hiddenAction_1]
autoTriggerOnEvent: created
temporarilyAddTags: COUNT, NOTREADY

[action_EK]
isActive: if not self.tags(includes="READY")
isGuiBlinking: if self.tags(includes="READY") and self.tags(includes='EK')
displayType:             upgrade
price:                   0
text:                    Базовая
description: Базовая фракция, сбалансированная и простая в освоении \n(доступны юниты из всех фракций)
iconImage:               mod-icon.png
buildSpeed:              2s
ai_isHighPriority:       true
temporarilyAddTags: READY, EK
temporarilyRemoveTags:   NOTREADY
showMessageToAllPlayers: Игрок %{self.playerName} готов (%{self.numberOfUnitsInAllTeams(withTag="READY")}/%{self.numberOfUnitsInAllTeams(withTag="COUNT")}) [Базовая]!
allowMultipleInQueue:false

[action_chooseOZD]
isActive: if not self.tags(includes="READY")
isGuiBlinking: if self.tags(includes="READY") and self.tags(includes='OZD')
isLocked: if not self.globalTeamTags(includes='FRACTIONUNLOCKED')
