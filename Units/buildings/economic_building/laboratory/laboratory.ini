[core]
@memory recursiveBuild: boolean
name:Eklaboratory
displayText:Лаборатория
displayDescription:-Высокотехнологичный комплекс, преобразующий нестабильный Кристаллин в чистый Экспериментал\n-Внутри его реакторов минерал подвергается интенсивному нагреву и электромагнитной стабилизации, выбрасывая излишки энергии в виде ослепительных вспышек\n-Требует значительного количества электроэнергии и бережного контроля — ошибка в процессе может привести к катастрофическому взрыву
price:40000
maxHp:2000
mass:9000
footprint:-2,-2,2,2
constructionFootprint:-2,-2,2,2
radius:50
isBuilding: true
isBuilder:true
techLevel:1
