[core]
copyFrom: ROOT:ASSETS/templates/factoryBase.template
name: EklandFactory
class: CustomUnitMetadata
price: 700
maxHp: 1200
mass: 9000
overrideAndReplace:landFactory
displayText:Land factory
displayDescription:-Can produce land units
displayText_ru:Завод бронетехники
displayDescription_ru:-Производит наземные единицы
footprint: -1,-1,1,2
constructionFootprint: -1,-1,1,3
techLevel: 1
radius: 25
isBio: false
isBuilding: true
explodeTypeOnDeath: building
exit_x:0
exit_y:-1
exit_moveAwayAmount:90

[action_builder]
@copyFromSection: template_landFacBuildActionBase
@define unit: builder
price: 500
buildSpeed: 12s

[action_builder2]
@copyFromSection: template_requeueCostResourceAction
@define unit: builder
addResources: credits=${-1*action_builder.price}

