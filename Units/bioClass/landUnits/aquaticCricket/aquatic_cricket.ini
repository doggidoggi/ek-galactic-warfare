#Aquatic Cricket by Essential Strategy
[core]
copyFrom:ROOT:ASSETS/templates/bio.template
name: aquaticCricket
class: CustomUnitMetadata
price: credits=10000, crystalline=4000
maxHp: 9600
mass: 12000
displayText: Aquatic Cricket
displayText_es: Grillo Acuático
displayDescription: -Transports up to 6 units\n-Attacks ground and air\n-Can be submerged\n-Self regenerate
displayDescription_es: -Transporta hasta 6 unidades\n-Ataca a tierra y aire\n-Puede ser sumergido\n-Auto-regeneración
techLevel: 2
buildSpeed: 0.0005
isUnrepairableUnit: true
#availableInDemo: true
radius: 18
isBio: true
isBug: true
experimental: true
selfRegenRate:0.1
softCollisionOnAll: 12
maxTransportingUnits: 6
transportUnitsHealBy: 0.14
transportUnitsKillOnDeath: false
effectOnDeath: CUSTOM:bigDeath

[action_water]
autoTrigger: if self.isOverwater()
convertTo: aquaticCricketSurface
buildSpeed: 0s
isVisible: false

[graphics]
drawLayer: experimentals
total_frames: 1
image:        aquatic_cricket.png
image_wreak:  cricket_dead.png
image_shadow: AUTO
shadowOffsetX:2
shadowOffsetY:2
lock_body_rotation_with_main_turret: true
animation_idle_start: 0
animation_idle_end: 0
animation_idle_speed: 80
animation_idle_scale_start:1
animation_idle_scale_end:1.03
animation_idle_pingPong: true
animation_attack_start: 0
animation_attack_end: 0
animation_attack_speed: 15
animation_attack_scale_start:1
animation_attack_scale_end:0.97
animation_attack_pingPong: true

[attack]
canAttack: true
canAttackFlyingUnits: true
canAttackLandUnits:   true
canAttackUnderwaterUnits: false
isFixedFiring: true
turretSize: 20
turretTurnSpeed: 3
maxAttackRange: 150
shootDelay: 35

[turret_1]
x: 0
y: 0
shoot_light:#FF00CCCC
recoilOffset: -3
