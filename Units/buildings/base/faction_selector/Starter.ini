isVisible:              true
isActive:               false
ai_isHighPriority:      false
temporarilyRemoveTags:  START

[hiddenAction_EKChoose]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="EK") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
addGlobalTeamTags: READY
playSoundToPlayer:ROOT:ASSETS/sounds/interface_open.ogg:1.0
convertTo:commandCenterEK
spawnUnits:EkTech(offsetX=-180),Ek_advertisement(spawnSource=getOffsetAbsolute)
addResources: fakeincome=62
[hiddenAction_OZDChoose]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="OZD") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
addGlobalTeamTags: READY, OZD
playSoundToPlayer:ROOT:ASSETS/sounds/event_faction_choose.wav:1.0
convertTo:reichCC
spawnUnits:EkOZDFlag(offsetX=50, offsetY=90),EkTech(offsetX=-180),Ek_advertisement(spawnSource=getOffsetAbsolute)
addResources: fakeincome=62

[hiddenAction_CyberstanChoose]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="CYBERSTAN") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
addGlobalTeamTags: READY, CYBERSTAN
playSoundToPlayer:ROOT:ASSETS/sounds/event_faction_choose.wav:1.0
convertTo:cyberstanCC
spawnUnits:EkCyberstanFlag(offsetX=90, offsetY=90),EkTech(offsetX=-180),Ek_advertisement(spawnSource=getOffsetAbsolute)
addResources: fakeincome=62

[hiddenAction_BananaChoose]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="BANANA") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
addGlobalTeamTags: READY, BANANA
playSoundToPlayer:ROOT:ASSETS/sounds/event_faction_choose.wav:1.0
convertTo:droppingBananaCC
spawnUnits:EkBananaFlag(offsetX=40, offsetY=90),EkTech(offsetX=-180),Ek_advertisement(spawnSource=getOffsetAbsolute)
addResources: fakeincome=62

[hiddenAction_JapanChoose]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="JAPAN") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
