price: credits=2000, crystalline=600
text: Upgrade - E2
text_es: Mejorar - E2
description: -Produces +8 credits\n-More HP
description_es: -Produce +8 créditos\n-Más PV
displayType: upgrade
buildSpeed: 0.0009
pos: 0

[graphics]
total_frames: 1
image:        bug_extractor.png
image_wreak:  NONE
image_shadow: NONE
shadowOffsetX:1
shadowOffsetY:1
