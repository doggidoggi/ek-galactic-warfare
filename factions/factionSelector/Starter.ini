[core]
showInEditor:false
overrideAndReplace:commandCenter
name:                EKSpawner
displayText:Выбор фракции
displayDescription:Выберите фракцию, за которую хотите играть
class:               CustomUnitMetadata
price:0
maxHp:0
mass:0
isPickableStartingUnit:true
isBuilding:true
isBuilder:false
fogOfWarSightRange:15
techLevel:1
isBio:false
footprint: -1, -1, 1, 1
radius:50
autoTriggerCooldownTime: 0.1s
canNotBeDirectlyAttacked:true
ignoreInUnitCapCalculation:true
hideScorchMark:true
disableDeathOnZeroHp:true
tags: factionSelector

[action_space]
isVisible: if self.tags(includes="NOTREADY")
buildSpeed:0
displayType: infoOnlyNoBox
isActive: false

[action_information]
isVisible: if self.tags(includes="NOTREADY")
buildSpeed:0
displayType:infoOnlyNoBox
isActive:false
text_ru:Информация
iconImage: info.png
description:Весёлый мод с кучей юнитов :) \n by doggidoggi TELEGRAM @doggidoggi1883

[hiddenAction_addTags]
autoTriggerOnEvent: created
temporarilyAddTags: COUNT, NOTREADY

[hiddenAction_createFactionLogos]
autoTriggerOnEvent: created
spawnUnits:earthFederationLogo(offsetX=-80, offsetY=90),cyberstanLogo(offsetX=80, offsetY=90),luminantLogo(offsetX=-80, offsetY=-90),infectsLogo(offsetX=80, offsetY=-90)

[hiddenAction_messageCyberstan]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="CYBERSTAN") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
showMessageToPlayer:[БАЗА] Системы реакторов онлайн! Раздавим их плазменными снарядами, Командир!
buildSpeed:0s
playSoundGlobally:ROOT:assets/sounds/event_message.wav:2.5

[hiddenAction_messageBanana]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="BANANA") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
showMessageToPlayer:[БАЗА] Гиперпространственные двигатели заряжены.
buildSpeed:0s
playSoundGlobally:ROOT:assets/sounds/event_message.wav:2.5

[hiddenAction_messageLuminant]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="LUMINANT") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
showMessageToPlayer:[БАЗА] Банзай!
buildSpeed:0s
playSoundGlobally:ROOT:assets/sounds/event_message.wav:2.5

[hiddenAction_messageOZD]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="OZD") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
showMessageToPlayer:[БАЗА] Слава Империи, командир.
buildSpeed:0s
playSoundGlobally:ROOT:assets/sounds/event_message.wav:2.5

[hiddenAction_messageBugs]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="BIO") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
showMessageToPlayer:[УЛЕЙ] *Агрессивный звук жуков*
buildSpeed:0s
playSoundToPlayer:ROOT:assets/sounds/zergling.ogg:3.5

[template_factionSelectorAction]
text: ${name}
isVisible: if self.tags(includes="NOTREADY")
isLocked: if not self.globalTeamTags(includes="FRACTIONUNLOCKED")
isLockedMessage: Фракция на данный момент недоступна
displayType: infoOnly
buildSpeed:2s
ai_isHighPriority:true
temporarilyRemoveTags: NOTREADY
showMessageToAllPlayers:Игрок %{self.playerName} готов (%{self.numberOfUnitsInAllTeams(withTag="READY")}/%{self.numberOfUnitsInAllTeams(withTag="COUNT")}) [${name}]!
allowMultipleInQueue:false
iconImage: ROOT:assets/ui/action_icons/template.png

[action_chooseEarthFederation]
@copyFromSection: template_factionSelectorAction
@define name: Земная Федерация
isLocked: false
description: Официальный статус: Демократия.\nОни стремятся объединить человечество в галактике под единым флагом Земли, продвигая идеалы свободы, равенства и сотрудничества. Они верят в силу науки и прогресса для создания лучшего будущего для всех, и их флот оснащен передовыми технологиями, чтобы защитить своих граждан и исследовать космос.
iconExtraImage: ROOT:assets/ui/faction_icons/earth_federation.png
temporarilyAddTags: READY, EARTHFEDERATION

[action_chooseCyberstan]
@copyFromSection: template_factionSelectorAction
@define name: Киберстан
description: Официальный статус: Машинный фашизм.\nОни не ведут переговоров, потому что в их коде нет переменной "Компромисс". Их цель - превратить галактику в одну гигантскую, безмолвную таблицу данных, где нет места человеку, любви или свободе.
iconExtraImage: ROOT:assets/ui/faction_icons/cyberstan.png
temporarilyAddTags: READY, CYBERSTAN

[action_chooseLuminant]
@copyFromSection: template_factionSelectorAction
@define name: Люминанты
description: Официальный статус: Фашистский культ.\nОни поклоняются древнему инопланетному божеству, которое обещает им бессмертие и власть в обмен на абсолютную преданность и поглощение других культур. Они видят себя избранными, предназначенными для того, чтобы править миром как божественные монархи после того, как уничтожат всех, кто не разделяет их веру.
iconExtraImage: ROOT:assets/ui/faction_icons/luminant.png
temporarilyAddTags: READY, LUMINANT

[action_chooseBio]
@copyFromSection: template_factionSelectorAction
@define name: Инфектоиды
description: Официальный статус: Террористический агро-режим.\nРадикальная фашистская экосистема. Отвергает принципы индивидуальной воли в пользу коллективного генетического господства. Они видят себя вершиной эволюции и стремятся поглотить все живое в своем пути, чтобы создать единый биологический организм, который будет править миром.
iconExtraImage: ROOT:assets/ui/faction_icons/infects.png
temporarilyAddTags: READY, INFECTS

[hiddenAction_EarthFederationChoose]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="EARTHFEDERATION") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
addGlobalTeamTags: READY
playSoundToPlayer:ROOT:assets/sounds/interface_open.ogg:1.0
convertTo:earthFederationBase
spawnUnits:EkTech(offsetX=-180)

[hiddenAction_CyberstanChoose]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="CYBERSTAN") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
addGlobalTeamTags: READY, CYBERSTAN
playSoundToPlayer:ROOT:assets/sounds/event_faction_choose.wav:1.0
convertTo:cyberstanCC

[hiddenAction_LuminantChoose]
autoTrigger: if self.tags(includes="READY") and self.tags(includes="LUMINANT") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
addGlobalTeamTags: READY, LUMINANT
playSoundToPlayer:ROOT:assets/sounds/event_faction_choose.wav:1.0
convertTo:yakuzCC

[hiddenAction_InfectsChoose] 
autoTrigger: if self.tags(includes="READY") and self.tags(includes="INFECTS") and self.numberOfUnitsInAllTeams(withTag="NOTREADY") == 0
addGlobalTeamTags: READY, INFECTS
convertTo:bugHive

[graphics]
image: temp.png
imageScale:1.4
image_shadow:AUTO
shadowOffsetX:2
shadowOffsetY:2
icon_build: faction_selector_icon.png
showQueueBar:false
disableLowHpFire:true
disableLowHpSmoke:true

[attack]
canAttack: false
canAttackFlyingUnits: false
canAttackLandUnits:   false
canAttackUnderwaterUnits: false
maxAttackRange: 0

[movement]
movementType: NONE